{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Criar Conta</h2>
                        <p class="text-muted">Junte-se a nós e salve suas builds!</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mt-3 shadow-sm">Cadastrar</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="mb-0">Já tem uma conta? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Faça Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
